app = "cubemate-signal"
primary_region = "sin"

[build]
  dockerfile = "server/Dockerfile"

[env]
  PORT = "3001"
  MATCHMAKING_BACKEND = "redis"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
