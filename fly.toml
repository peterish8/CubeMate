app = "cubemate-server"
primary_region = "sin"

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
