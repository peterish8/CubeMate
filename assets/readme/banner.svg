      <rect x="1" y="1" width="1198" height="378" fill="url(#diagHatch)"/>
    </g>
    <rect x="1" y="1" width="3" height="376" rx="1.5" fill="url(#accentGrad)" opacity="0.9"/>
    <g transform="translate(930, 190)">
      <circle r="88" fill="url(#orbGlow)"/>
      <circle r="72" fill="none" stroke="#1a1a1a" stroke-width="8"/>
      <circle r="72" fill="none" stroke="url(#orbRing)" stroke-width="6" stroke-dasharray="18 12" opacity="0.9"/>
      <circle r="52" fill="#0a0a0a" stroke="#6366f1" stroke-width="1.5" opacity="0.45"/>
      <text y="6" text-anchor="middle" fill="#fff" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="22" font-weight="900">CM</text>
    </g>
    <rect x="72" y="44" width="84" height="84" rx="20" fill="#000" stroke="#262626" stroke-width="1"/>
    <text x="114" y="98" text-anchor="middle" fill="#6366f1" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="32" font-weight="900">CM</text>
    <text x="72" y="210" fill="#ffffff" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="54" font-weight="900" letter-spacing="-2.5">Cube<tspan fill="url(#accentGrad)">Mate</tspan></text>
    <text x="72" y="256" fill="#8a8a8a" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="16" font-weight="500">Real-time P2P Speedcubing Races</text>
    <g transform="translate(72, 298)"><rect width="168" height="40" rx="10" fill="#111" stroke="#222" stroke-width="1"/><circle cx="22" cy="20" r="4" fill="#6366f1"/><text x="36" y="25" fill="#bbb" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="12" font-weight="600">▲ Live on Vercel</text></g>
    <g transform="translate(256, 298)"><rect width="168" height="40" rx="10" fill="#111" stroke="#222" stroke-width="1"/><text x="84" y="25" text-anchor="middle" fill="#6366f1" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="12" font-weight="800">GitHub</text></g>
    <g transform="translate(440, 298)"><rect width="168" height="40" rx="10" fill="#111" stroke="#6366f1" stroke-width="1" opacity="0.35"/><circle cx="22" cy="20" r="4" fill="#6366f1"/><text x="36" y="25" fill="#bbb" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="12" font-weight="600">License</text></g>
    <text x="72" y="356" fill="#3a3a3a" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="2.5">REACT 18  · REACT  · EXPO</text>
